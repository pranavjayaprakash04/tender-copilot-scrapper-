name: TenderPilot Autonomous Scraper
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      portal:
        description: 'Which portal to scrape'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gem
          - cppp
          - tn
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        portal: [gem, cppp, tn]
    name: Scrape ${{ matrix.portal }}
    steps:
      - name: Check if portal should run
        id: check
        run: |
          SELECTED="${{ github.event.inputs.portal || 'all' }}"
          PORTAL="${{ matrix.portal }}"
          if [ "$SELECTED" = "all" ] || [ "$SELECTED" = "$PORTAL" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        if: steps.check.outputs.run == 'true'
        run: npm install

      - name: Install Playwright Chromium
        if: steps.check.outputs.run == 'true'
        run: npx playwright install chromium --with-deps

      - name: Create logs directory
        if: steps.check.outputs.run == 'true'
        run: mkdir -p logs

      - name: Run ${{ matrix.portal }} scraper
        if: steps.check.outputs.run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          REQUEST_DELAY_MIN: 2000
          REQUEST_DELAY_MAX: 5000
        run: node ${{ matrix.portal }}.js

      - name: Upload scraper logs
        if: always() && steps.check.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.portal }}-${{ github.run_number }}
          path: logs/
          retention-days: 7
